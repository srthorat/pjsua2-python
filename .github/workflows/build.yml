name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      pjsip_ref:
        description: "Optional pjproject tag, branch, or commit override"
        required: false
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.runner }} wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux and macOS verified OK — disabled while fixing Windows
          # - runner: ubuntu-22.04
          #   archs: x86_64
          #   macosx_deployment_target: ""
          # - runner: macos-15-intel
          #   archs: x86_64
          #   macosx_deployment_target: "15.0"
          # - runner: macos-14
          #   archs: arm64
          #   macosx_deployment_target: "14.0"
          - runner: windows-2022
            archs: AMD64
            macosx_deployment_target: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared build frontend
        run: python -m pip install --upgrade pip cibuildwheel build

      - name: Install Linux wheel repair tools
        if: startsWith(matrix.runner, 'ubuntu-')
        run: python -m pip install auditwheel

      - name: Install macOS wheel repair tools
        if: startsWith(matrix.runner, 'macos-')
        run: python -m pip install delocate

      - name: Determine bundled PJSIP version
        id: version
        shell: bash
        run: |
          package_version="$(python scripts/get_package_version.py)"
          requested_ref="${{ github.event.inputs.pjsip_ref }}"
          if [[ -n "${requested_ref}" ]]; then
            echo "pjsip_ref=${requested_ref}" >> "$GITHUB_OUTPUT"
          else
            echo "pjsip_ref=${package_version}" >> "$GITHUB_OUTPUT"
          fi
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
          PJSIP_REF: ${{ steps.version.outputs.pjsip_ref }}
        run: python -m cibuildwheel --output-dir dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}
          path: dist/*

  package-check:
    name: Build source package
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging validators
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create GitHub release
    needs:
      - build
      - package-check
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish to PyPI
    needs:
      - build
      - package-check
      - github-release
    runs-on: ubuntu-22.04
    permissions:
      id-token: write

    steps:
      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
